<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<h2>Confirmation</h2>
<p>Confirmez-vous le signalement de ce mail suspect ?</p>

<button onclick="confirm()">Oui</button>
<button onclick="closeDialog()">Non</button>

<script>
function confirm() {
    Office.context.ui.messageParent("confirmed");
}

function closeDialog() {
    Office.context.ui.messageParent("cancelled");
}
</script>

</body>
</html>
